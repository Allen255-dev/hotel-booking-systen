{% extends 'hotel_booking/base.html' %}
{% block title %}My Profile{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <p class="gold-text text-xs tracking-widest uppercase mb-2">Account</p>
    <h1 class="text-3xl font-serif text-white mb-8">My Profile</h1>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-gray-400 text-sm mb-2">First Name</label>
                <input type="text" name="first_name" value="{{ user.first_name }}"
                    class="w-full bg-charcoal border border-gray-700 text-white px-4 py-3 rounded focus:outline-none focus:border-yellow-500">
            </div>
            <div>
                <label class="block text-gray-400 text-sm mb-2">Last Name</label>
                <input type="text" name="last_name" value="{{ user.last_name }}"
                    class="w-full bg-charcoal border border-gray-700 text-white px-4 py-3 rounded focus:outline-none focus:border-yellow-500">
            </div>
        </div>
        <div>
            <label class="block text-gray-400 text-sm mb-2">Email</label>
            <input type="email" name="email" value="{{ user.email }}"
                class="w-full bg-charcoal border border-gray-700 text-white px-4 py-3 rounded focus:outline-none focus:border-yellow-500">
        </div>
        <div>
            <label class="block text-gray-400 text-sm mb-2">Phone Number</label>
            <input type="text" name="phone_number" value="{{ profile.phone_number }}"
                class="w-full bg-charcoal border border-gray-700 text-white px-4 py-3 rounded focus:outline-none focus:border-yellow-500">
        </div>
        <div>
            <label class="block text-gray-400 text-sm mb-2">Address</label>
            <textarea name="address" rows="2"
                class="w-full bg-charcoal border border-gray-700 text-white px-4 py-3 rounded focus:outline-none focus:border-yellow-500">{{ profile.address }}</textarea>
        </div>
        <button type="submit" class="w-full gold-bg text-black py-4 font-bold tracking-widest uppercase hover:opacity-90 transition">Save Changes</button>
    </form>
    <div class="mt-6 text-center">
        <a href="{% url 'bookings:booking_list' %}" class="text-gray-500 hover:text-white text-sm transition">View My Bookings →</a>
    </div>
</div>
{% endblock %}
