<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LuxeStay Hotels{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#C9A84C',
                        dark: '#0F0F0F',
                        charcoal: '#1A1A1A',
                    },
                    fontFamily: {
                        serif: ['Georgia', 'serif'],
                        sans: ['system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0F0F0F; color: #F5F5F5; }
        .gold-border { border-color: #C9A84C; }
        .gold-text { color: #C9A84C; }
        .gold-bg { background-color: #C9A84C; }
    </style>
</head>
<body class="min-h-screen font-sans">

    <!-- Navbar -->
    <nav class="border-b border-gray-800 bg-charcoal px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="/" class="text-2xl font-serif gold-text tracking-widest">LUXESTAY</a>
            <div class="flex items-center gap-6 text-sm">
                <a href="/" class="text-gray-300 hover:text-white transition">Rooms</a>
                {% if user.is_authenticated %}
                    <a href="{% url 'bookings:booking_list' %}" class="text-gray-300 hover:text-white transition">My Bookings</a>
                    <a href="{% url 'accounts:profile' %}" class="text-gray-300 hover:text-white transition">Profile</a>
                    <a href="{% url 'accounts:logout' %}" class="gold-bg text-black px-4 py-2 text-xs font-bold tracking-widest uppercase hover:opacity-90 transition">Logout</a>
                {% else %}
                    <a href="{% url 'accounts:login' %}" class="text-gray-300 hover:text-white transition">Login</a>
                    <a href="{% url 'accounts:register' %}" class="gold-bg text-black px-4 py-2 text-xs font-bold tracking-widest uppercase hover:opacity-90 transition">Register</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- Messages -->
    {% if messages %}
    <div class="max-w-7xl mx-auto px-6 mt-4">
        {% for message in messages %}
        <div class="p-4 mb-2 rounded border {% if message.tags == 'error' %}border-red-500 bg-red-900/20 text-red-400{% else %}border-green-500 bg-green-900/20 text-green-400{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <!-- Content -->
    <main class="max-w-7xl mx-auto px-6 py-10">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-800 mt-20 py-10 text-center text-gray-500 text-sm">
        <p class="gold-text font-serif text-lg tracking-widest mb-2">LUXESTAY</p>
        <p>© 2026 LuxeStay Hotels. All rights reserved.</p>
    </footer>

</body>
</html>
